<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="style.css"> <!-- Linking the new CSS file -->
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <img src="logo.png" alt="Company Logo" style="width: 200px; height: auto;">
        </div>
        <h1 class="form-title">Application Form</h1>
    </header>

    <main>
        <form action="#" method="post" class="form-container">
            <!-- Personal Information -->
            <section class="form-section">
                <h2>Personal Information</h2>
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

                <label for="address">Address:</label>
                <textarea id="address" name="address" rows="3" placeholder="Enter your address" required></textarea>
            </section>

            <!-- Job Information -->
            <section class="form-section">
                <h2>Job Information</h2>
                <label for="position">Position Applied For:</label>
                <input type="text" id="position" name="position" placeholder="Enter position" required>

                <label for="experience">Years of Experience:</label>
                <input type="number" id="experience" name="experience" min="0" placeholder="Enter years of experience" required>

                <label for="resume">Upload Resume:</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required>
            </section>

            <!-- Submit Button -->
            <div class="submit-container">
                <button type="submit" class="submit-button">Submit Application</button>
            </div>
        </form>
    </main>
</body>
</html>
